name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Build catalog generator
        run: pnpm build:generator

      - name: Create release tarball
        run: |
          mkdir -p release-staging
          cp dist/index.html release-staging/
          cp -r dist/assets release-staging/
          cp dist/generate-catalog.js release-staging/
          tar -czf static-rocrate-viewer.tar.gz -C release-staging .

      - name: Release
        run: pnpm semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LEFTHOOK: "0"
